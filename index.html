<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>Calculator</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
  </head>


  <body>
    <div class="frame">
      <div class="screen">
      </div>
      <div class="buttons">
        <button class="sideBttns" id="plus">+</button>
        <button class="sideBttns" id="minus">-</button>
        <button class="sideBttns" id="multiply">*</button>
        <button class="sideBttns" id="divide">/</button>
        <button class="sideBttns" id="equal">=</button>
        <button class="sideBttns" id="clear">CE</button>
      </div>
    </div>
    <footer></footer>
  </body>
</html>
